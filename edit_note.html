{% extends 'base.html' %}
{% block title %}تعديل ملاحظة{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-warning text-dark">
        <h4>تعديل الملاحظة</h4>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">العنوان</label>
                <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">المحتوى</label>
                <textarea name="content" class="form-control" rows="6" required>{{ note.content }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">التصنيف</label>
                <select name="category_id" class="form-select">
                    <option value="">بدون تصنيف</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if note.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-warning">حفظ التعديلات</button>
            <a href="{{ url_for('notes') }}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
