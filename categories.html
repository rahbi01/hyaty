{% extends 'base.html' %}
{% block title %}التصنيفات{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-tags"></i> التصنيفات</h4>
    <button class="btn btn-primary rounded-circle" style="width: 44px; height: 44px;" data-bs-toggle="modal" data-bs-target="#addCatModal"><i class="bi bi-plus-lg fs-5"></i></button>
</div>

<div class="row g-2">
    {% for cat in categories %}
    <div class="col-6 col-md-4">
        <div class="card category-card text-center p-2" style="border-right: 4px solid {{ cat.color }};">
            <div class="card-body p-2">
                <i class="bi bi-tag-fill" style="color: {{ cat.color }}; font-size: 1.5rem;"></i>
                <h6 class="mt-1 mb-0">{{ cat.name }}</h6>
                <small>{{ cat.tasks|length }} مهام | {{ cat.notes|length }} ملاحظات</small>
                <div class="mt-2 d-flex justify-content-center gap-2">
                    <a href="{{ url_for('filter_by_category', cat_id=cat.id) }}" class="btn btn-sm btn-outline-primary btn-icon"><i class="bi bi-eye"></i></a>
                    <a href="{{ url_for('delete_category', cat_id=cat.id) }}" class="btn btn-sm btn-outline-danger btn-icon" onclick="return confirm('حذف التصنيف سيؤدي إلى إزالة التصنيف عن المهام والملاحظات المرتبطة. متابعة؟')"><i class="bi bi-trash3"></i></a>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <div class="alert alert-light text-center">🏷️ لا توجد تصنيفات. أضف تصنيفك الأول!</div>
    </div>
    {% endfor %}
</div>

<!-- مودال إضافة تصنيف -->
<div class="modal fade" id="addCatModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="{{ url_for('add_category') }}">
                <div class="modal-header"><h5>تصنيف جديد</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="text" name="name" class="form-control mb-2" placeholder="اسم التصنيف" required>
                    <label class="form-label">اختر لوناً</label>
                    <input type="color" name="color" class="form-control form-control-color" value="#0d6efd">
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">حفظ</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
