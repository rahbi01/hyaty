{% extends 'base.html' %}
{% block title %}تعديل هدف أسبوعي{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-warning text-dark">
        <h4>تعديل الهدف الأسبوعي</h4>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">العنوان</label>
                <input type="text" name="title" class="form-control" value="{{ goal.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">الوصف</label>
                <textarea name="description" class="form-control" rows="3">{{ goal.description or '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">تاريخ البداية</label>
                    <input type="date" name="start_date" class="form-control" value="{{ goal.start_date }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">تاريخ النهاية</label>
                    <input type="date" name="end_date" class="form-control" value="{{ goal.end_date }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">الهدف الشهري المرتبط</label>
                <select name="monthly_goal_id" class="form-select" required>
                    {% for mg in monthly_goals %}
                    <option value="{{ mg.id }}" {% if mg.id == goal.monthly_goal_id %}selected{% endif %}>
                        {{ mg.title }} ({{ mg.start_date }} → {{ mg.end_date }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-warning">حفظ التعديلات</button>
            <a href="{{ url_for('weekly_goals') }}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
